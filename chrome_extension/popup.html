<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 340px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0B0F19;
            color: #f8fafc;
            padding: 1.5rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        h1 span {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 1.25rem;
        }

        .field {
            margin-bottom: 0.75rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.7rem 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.15);
        }

        input::placeholder {
            color: #64748b;
        }

        .track-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 10px;
            color: #0B0F19;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.02em;
        }

        .track-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.3);
        }

        .track-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 0.75rem;
            padding: 0.6rem 0.85rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            display: none;
            text-align: center;
        }

        #status.success {
            display: block;
            background: rgba(67, 233, 123, 0.12);
            border: 1px solid rgba(67, 233, 123, 0.25);
            color: #43e97b;
        }

        #status.error {
            display: block;
            background: rgba(250, 8, 116, 0.12);
            border: 1px solid rgba(250, 8, 116, 0.25);
            color: #fa0874;
        }

        .settings {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .settings label {
            margin-bottom: 0.3rem;
        }

        .settings input {
            font-size: 0.8rem;
            padding: 0.55rem 0.75rem;
        }
    </style>
</head>
<body>
    <h1><span>Pulse</span> Tracker</h1>
    <p class="subtitle">Track any Amazon product in one click.</p>

    <div class="field">
        <label>Product URL (auto-detected)</label>
        <input type="text" id="productUrl" placeholder="https://www.amazon.in/...">
    </div>

    <div class="field">
        <label>Target Price (₹)</label>
        <input type="number" id="targetPrice" placeholder="e.g. 50000">
    </div>

    <button class="track-btn" id="trackBtn">🚀 Track This Product</button>

    <div id="status"></div>

    <div class="settings">
        <label>Dashboard API URL</label>
        <input type="text" id="apiUrl" value="http://127.0.0.1:5050">
    </div>

    <script src="popup.js"></script>
</body>
</html>
